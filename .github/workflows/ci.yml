name: Deploy to AWS Instance Server

on:
  push:
    branches:
      - main

jobs:
  deploy:
    if: github.repository == 'ERICA-We-Meet-Hyre-Me/Hyre-Me-BE'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Copy project files to server
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT }}
          source: "app,requirements.txt"
          target: "/var/www/hyre-me/api"
          overwrite: true
          strip_components: 0

      - name: Restart FastAPI service
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT }}
          script: |
            # 1. API 디렉토리 이동
            cd /var/www/hyre-me/api
            
            # 2. 가상환경 활성화 및 패키지 설치
            source .venv/bin/activate
            pip install -r requirements.txt
            
            # 3. systemd 서비스 재시작
            sudo systemctl daemon-reload
            sudo systemctl restart hyre-me-api || (sudo journalctl -xeu hyre-me-api.service --no-pager; exit 1)
            sudo systemctl status hyre-me-api || true
